name: CI

on:
  push:
    branches:
      - master
      - main
      - cloud-deployment
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pytest

      - name: Check tracked files for sensitive data
        run: python .github/check_secrets.py

      - name: Run unit tests
        run: python -m pytest -q
