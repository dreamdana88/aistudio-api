services:
  aistudio-api:
    image: ${AISTUDIO_IMAGE:-ghcr.io/dreamdana88/aistudio-api:latest}
    container_name: aistudio-api
    restart: unless-stopped
    init: true
    ports:
      - "127.0.0.1:${AISTUDIO_BIND_PORT:-8080}:8080"
    volumes:
      - aistudio-api-data:/app/data
      - aistudio-api-browser-cache:/root/.cloakbrowser
      - ./config.yaml:/app/config.yaml
    environment:
      AISTUDIO_PORT: "8080"
      AISTUDIO_BROWSER: "chromium"
      AISTUDIO_BROWSER_PORT: "9222"
      AISTUDIO_BROWSER_HEADLESS: "1"
      AISTUDIO_ACCOUNTS_DIR: "/app/data/accounts"
      AISTUDIO_API_KEY: "${AISTUDIO_API_KEY:?Set AISTUDIO_API_KEY in the 1Panel Compose environment}"
      AISTUDIO_REQUIRE_API_KEY: "1"
      AISTUDIO_PROXY: "${AISTUDIO_PROXY:-}"
      AISTUDIO_MAX_CONCURRENCY: "${AISTUDIO_MAX_CONCURRENCY:-1}"
    mem_limit: 1800m
    cpus: 1.75
    shm_size: 512m
    pids_limit: 512
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

volumes:
  aistudio-api-data:
    name: aistudio-api-data
  aistudio-api-browser-cache:
    name: aistudio-api-browser-cache
